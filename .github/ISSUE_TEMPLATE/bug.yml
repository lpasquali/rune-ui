name: Bug Report
description: Something isn't working
labels: ["type/bug", "status/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in all required fields.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How critical is this bug?
      options:
        - "p0 — blocks release or security exposure"
        - "p1 — must fix in current milestone"
        - "p2 — planned, not time-sensitive"
        - "p3 — low priority"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the system is affected?
      options:
        - "area/core"
        - "area/api"
        - "area/agents"
        - "area/ci-cd"
        - "area/helm"
        - "area/operator"
        - "area/ui"
        - "area/docs"
        - "area/security"
        - "area/compliance"
        - "area/infra"
        - "area/observability"
    validations:
      required: true
  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      description: "Every issue must belong to an epic. Paste the epic issue URL or #number. If no epic exists yet, create one first."
      placeholder: "#NNN or https://github.com/lpasquali/repo/issues/NNN"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact commands or steps to reproduce the bug.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, Python/Go version, Docker version, Helm version, cluster type (kind/production), etc."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste error output, stack traces, or attach screenshots.
    validations:
      required: false
