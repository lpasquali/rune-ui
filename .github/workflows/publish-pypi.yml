# SPDX-License-Identifier: Apache-2.0
name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build and publish to PyPI
    # Extra safety: ensure this only ever runs on a real tag push, not on a branch.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rune-ui/

    permissions:
      id-token: write   # Required for OIDC token exchange with PyPI
      contents: write   # Required to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Verify tag is on main and version matches pyproject.toml
        run: |
          git fetch origin main
          COMMIT_SHA=$(git rev-parse "${GITHUB_SHA}^{commit}" 2>/dev/null || echo "$GITHUB_SHA")
          if ! git merge-base --is-ancestor "$COMMIT_SHA" origin/main; then
            echo "ERROR: Tagged commit is not reachable from origin/main." >&2
            echo "Tags must only be pushed AFTER merging to main." >&2
            exit 1
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python - <<'EOF'
          import tomllib, pathlib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)." >&2
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - name: Install build tools
        run: pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify dist contents
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
