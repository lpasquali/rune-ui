# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    uses: lpasquali/rune-ci/.github/workflows/release.yml@182398cc58c0358d7cd32ab97944ed6c46107a7b
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    with:
      image-name: "rune-ui"
      notify-charts: true
    secrets:
      RUNE_CHARTS_BOT_TOKEN: ${{ secrets.RUNE_CHARTS_BOT_TOKEN }}
