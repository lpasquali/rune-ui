# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    uses: lpasquali/rune-ci/.github/workflows/release.yml@14fe4ea7bd322f1e2c8ec59fc2d733527e905d2e # main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    with:
      image-name: "rune-ui"
      notify-charts: true
    secrets:
      RUNE_CHARTS_BOT_TOKEN: ${{ secrets.RUNE_CHARTS_BOT_TOKEN }}
