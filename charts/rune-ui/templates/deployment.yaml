apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rune-ui.fullname" . }}
  labels:
    {{- include "rune-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "rune-ui.name" . | quote }}
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "rune-ui.name" . | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
    spec:
      {{- if .Values.runtimeClass.enabled }}
      # Wire the gVisor / Kata RuntimeClass when isolation is enabled (Issue #12).
      runtimeClassName: {{ .Values.runtimeClass.name | quote }}
      {{- end }}
      containers:
        - name: rune-ui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
