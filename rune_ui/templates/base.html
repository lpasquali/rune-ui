<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNE — Reliability Use-case Numeric Evaluator</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <link rel="stylesheet" href="/static/solarized.css">
    <link rel="stylesheet" href="/static/solarized-light.css">
    <link rel="stylesheet" href="/static/print.css">
    <script src="/static/vendor/chart.umd.min.js"></script>
</head>
<body>
    <header>
        <h1>RUNE <small style="font-size: 0.5em; color: var(--base01)">// INDUSTRIAL SRE AGENTIC PIPELINES</small></h1>
        <div class="theme-controls">
            <button id="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Theme">
                <span id="theme-icon">◑</span>
            </button>
        </div>
    </header>
    <script>
    (function() {
        var btn = document.getElementById('theme-toggle');
        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            btn.textContent = theme === 'light' ? 'Light' : 'Dark';
        }
        var saved = localStorage.getItem('rune-theme');
        if (saved) {
            applyTheme(saved);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            applyTheme('light');
        } else {
            applyTheme('dark');
        }
        btn.addEventListener('click', function() {
            var next = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            localStorage.setItem('rune-theme', next);
            applyTheme(next);
        });
    })();
    </script>
    
    <div class="container">
        <nav>
            <ul>
                <li><a hx-get="/dashboard" hx-target="#main">Dashboard</a></li>
                <li><a hx-get="/config" hx-target="#main">Configuration</a></li>
                <li><a hx-get="/benchmarks" hx-target="#main">Benchmarks</a></li>
                <li><a hx-get="/reports" hx-target="#main">Reports</a></li>
            </ul>
        </nav>
        
        <main id="main">
            <div class="card">
                <h2>Welcome to RUNE</h2>
                <p>Select a module from the sidebar to begin.</p>
                <div id="status" hx-get="/api/status" hx-trigger="load, every 30s">
                    Checking RUNE API status...
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            const isLight = body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcon(isLight);
        }

        function updateThemeIcon(isLight) {
            const icon = document.getElementById('theme-icon');
            icon.textContent = isLight ? '☀️' : '🌙';
        }

        // Initialize theme from localStorage
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                updateThemeIcon(true);
            } else {
                updateThemeIcon(false);
            }
        })();
    </script>
</body>
</html>
