<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNE — Reliability Use-case Numeric Evaluator</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <link rel="stylesheet" href="/static/solarized.css">
    <style>
        :root {
            /* Solarized Dark (default) */
            --base03: #002b36;
            --base02: #073642;
            --base01: #586e75;
            --base00: #657b83;
            --base0: #839496;
            --base1: #93a1a1;
            --base2: #eee8d5;
            --base3: #fdf6e3;
            --yellow: #b58900;
            --orange: #cb4b16;
            --red: #dc322f;
            --magenta: #d33682;
            --violet: #6c71c4;
            --blue: #268bd2;
            --cyan: #2aa198;
            --green: #859900;
        }

        body {
            background-color: var(--base03);
            color: var(--base0);
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }

        header {
            border-bottom: 2px solid var(--base02);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        h1 { color: var(--blue); }
        h2 { color: var(--cyan); }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav a {
            color: var(--green);
            text-decoration: none;
            display: block;
            padding: 10px;
            border: 1px solid transparent;
        }

        nav a:hover {
            border-color: var(--base01);
            background: var(--base02);
        }

        .card {
            background: var(--base02);
            padding: 20px;
            border-radius: 4px;
            border: 1px solid var(--base01);
        }

        button {
            background: var(--base02);
            color: var(--blue);
            border: 1px solid var(--blue);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
        }

        button:hover {
            background: var(--blue);
            color: var(--base03);
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--base03);
            border: 2px solid var(--orange);
            padding: 40px;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
        }
    </style>
</head>
<body>
    <header>
        <h1>RUNE <small style="font-size: 0.5em; color: var(--base01)">// INDUSTRIAL SRE AGENTIC PIPELINES</small></h1>
    </header>
    
    <div class="container">
        <nav>
            <ul>
                <li><a hx-get="/dashboard" hx-target="#main">Dashboard</a></li>
                <li><a hx-get="/config" hx-target="#main">Configuration</a></li>
                <li><a hx-get="/benchmarks" hx-target="#main">Benchmarks</a></li>
                <li><a hx-get="/reports" hx-target="#main">Reports</a></li>
            </ul>
        </nav>
        
        <main id="main">
            <div class="card">
                <h2>Welcome to RUNE</h2>
                <p>Select a module from the sidebar to begin.</p>
                <div id="status" hx-get="/api/status" hx-trigger="load, every 30s">
                    Checking RUNE API status...
                </div>
            </div>
        </main>
    </div>
</body>
</html>
